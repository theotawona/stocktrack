name: stocktrack
services:
- name: stocktrack-app
  github:
    branch: main
    repo: theotawona/stocktrack
  build_command: ''
  dockerfile_path: Dockerfile
  source_dir: ''
  http_port: 8501
  envs:
  - key: STREAMLIT_SERVER_HEADLESS
    value: 'true'
  - key: STREAMLIT_SERVER_PORT
    value: '8501'
  - key: STREAMLIT_LOGGER_LEVEL
    value: info
  - key: DB_PATH
    value: /app/data/stock_tracker.db
  health_check:
    http_path: /_stcore/health
  internal_ports:
  - 8501
  instance_count: 1
  instance_size_slug: basic-xs
static_sites: []
jobs: []
domains:
- domain: stocktrack.yourcompany.com  # Replace with your custom domain
  type: PRIMARY
