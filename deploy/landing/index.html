<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StockTrack | Corporate Analytica</title>
  <meta name="description" content="StockTrack is Corporate Analytica's stock and property management platform." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="StockTrack" />
  <meta property="og:title" content="StockTrack | Corporate Analytica" />
  <meta property="og:description" content="Stock and property management platform by Corporate Analytica." />
  <meta property="og:url" content="https://ca-stocktrack.com/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="StockTrack | Corporate Analytica" />
  <meta name="twitter:description" content="Stock and property management platform by Corporate Analytica." />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #16a34a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 500px at 10% -10%, #1f2937 0%, transparent 60%),
        radial-gradient(800px 500px at 90% 0%, #14532d 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(17,24,39,0.95), rgba(15,23,42,0.95));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.16);
      color: #86efac;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 62ch;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn.primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #03240d;
      box-shadow: 0 10px 24px rgba(34,197,94,0.30);
    }

    .btn.secondary {
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Corporate Analytica</span>
    <h1>StockTrack</h1>
    <p>
      Centralized stock and property inventory control for operational teams.
      Use the secure app portal to issue, reconcile, and monitor stock.
    </p>

    <div class="actions">
      <a class="btn primary" href="/app/">Open StockTrack App</a>
      <a class="btn secondary" href="mailto:support@corporateanalytica.co.za">Contact Support</a>
    </div>

    <p class="hint">If you bookmarked the old URL, update it to https://ca-stocktrack.com/app/</p>
  </main>
</body>
</html>
