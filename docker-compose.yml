version: "3.8"

services:
  stocktrack:
    build: .
    container_name: stocktrack
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - stocktrack-data:/app/data
    environment:
      - DB_PATH=/app/data/stock_tracker.db
      - USERS_YAML_PATH=/app/data/users.yaml
      - SEED_DEMO=false
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_BASE_URL_PATH=app
      - STREAMLIT_LOGGER_LEVEL=info

volumes:
  stocktrack-data:
